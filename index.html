<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supa Clicker</title>
    <link rel="icon" href="https://raw.githubusercontent.com/zOcMYT/supaclicker.github.io/refs/heads/main/ButtonIcon.png">

    <style>
        :root {
            --default-bg-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRhQhK_wQIRUwpbM_pXJHn18sC8ovXBGirUpQ&s');
            --level1-bg-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRvD90oZ0SLUt9Hizd90BlaEeI4BtMrHiO1HA&s');
            --level2-bg-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRJ0fLUcPj6yXtpt7TsigDNgcijL3CSWuSAzQ&s');
            --level3-bg-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTg95X8tdImD1AZZ0dEnSCZdEx3t3iWyXwqsA&s');
            --level4-bg-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSM9-ANfPq_7ESF0UHnzM6s3HLaSHie6F140Q&s');

            --font-default: 'Marker Felt', fantasy;
            --font-color: white;
            --button-border-color: #ffffff;
            --upgrade-button-bg: rgb(54, 41, 58);
            --ui-overlay-bg: rgba(0, 0, 0, 0.8);
        }

        body {
            background-color: black;
            background-image: var(--default-bg-image);
            background-size: cover;
            background-position: center;
            transition: background-image 0.5s ease-in-out;
            margin: 0;
            overflow: hidden;
            font-family: var(--font-default);
            color: var(--font-color);
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #dailyRewardContainer {
            position: absolute; top: 20px; left: 20px;
            background-color: var(--ui-overlay-bg);
            padding: 15px; border-radius: 10px; z-index: 9999;
            text-align: center; border: 1px solid white;
        }

        #statsContainer {
            position: absolute; bottom: 20px; left: 20px;
            background-color: var(--ui-overlay-bg);
            padding: 15px; border-radius: 10px; z-index: 9999;
            border: 1px solid white; min-width: 180px; pointer-events: none;
        }

        #statsContainer div { font-size: 1.4rem; margin: 5px 0; white-space: nowrap; }

        #resetButtonContainer { position: absolute; top: 20px; right: 20px; z-index: 9999; }

        .main-button {
            display: inline-block; min-width: 300px; padding: 40px 60px;
            font-size: 5vw; border: 0.8vw solid var(--button-border-color);
            border-radius: 20px; color: var(--font-color); cursor: pointer;
            transition: transform 0.1s; background-color: transparent;
            margin-bottom: 20px; text-align: center;
        }

        .main-button:active { transform: scale(0.95); }

        .upgrade-button {
            display: inline-block; padding: 20px 40px; font-size: 1.5rem;
            border: 0.4vw solid var(--button-border-color);
            border-radius: 15px; color: var(--font-color); cursor: pointer;
        }

        .rainbow-strobe {
            background-image: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet);
            background-size: 400% 400%;
            animation: rainbow 3s linear infinite;
        }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #claimButton { background-color: green; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        #claimButton:disabled { background-color: gray; cursor: not-allowed; }
        #resetButton { background-color: red; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }

        @media (max-width: 768px) {
            .main-button { font-size: 8vw; padding: 20px 40px; min-width: 200px; }
            .upgrade-button { font-size: 1rem; }
            #statsContainer div { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div id="dailyRewardContainer">
        <div id="rewardTimer">Calculating...</div>
        <button id="claimButton">Claim Daily Reward (1.5x)</button>
    </div>

    <div id="statsContainer">
        <div id="cpsDisplay"><b>CPS:</b> 0</div>
        <div id="cpmDisplay"><b>CPM:</b> 0</div>
    </div>

    <div id="resetButtonContainer">
        <button id="resetButton">Reset Game</button>
    </div>

    <script>
        let timesClicked = BigInt(localStorage.getItem('sc_clicks') || "0");
        let currentUpgradeCost = BigInt(localStorage.getItem('sc_cost') || "250");
        let maxClicksPerRandom = BigInt(localStorage.getItem('sc_power') || "5");
        let lastClaimTime = parseInt(localStorage.getItem('sc_claimTime') || "0");
        
        // clickHistory now only stores timestamps of when a click occurred
        let clickHistory = [];

        const BACKGROUNDS = {
            default: 'url(\'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRhQhK_wQIRUwpbM_pXJHn18sC8ovXBGirUpQ&s\')',
            level1: 'url(\'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRvD90oZ0SLUt9Hizd90BlaEeI4BtMrHiO1HA&s\')',
            level2: 'url(\'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRJ0fLUcPj6yXtpt7TsigDNgcijL3CSWuSAzQ&s\')',
            level3: 'url(\'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTg95X8tdImD1AZZ0dEnSCZdEx3t3iWyXwqsA&s\')',
            level4: 'url(\'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSM9-ANfPq_7ESF0UHnzM6s3HLaSHie6F140Q&s\')'
        };

        const LEVEL_THRESHOLDS = [
            { value: 1_000_000_000n, bg: BACKGROUNDS.level1 },
            { value: 1_000_000_000_000_000n, bg: BACKGROUNDS.level2 },
            { value: 1_000_000_000_000_000_000_000n, bg: BACKGROUNDS.level3 },
            { value: 1_000_000_000_000_000_000_000_000_000n, bg: BACKGROUNDS.level4 }
        ];

        const clickSound = new Audio("https://github.com/zOcMYT/supaclicker.github.io/raw/main/Mouseclick.wav");
        const oiSound = new Audio("https://github.com/zOcMYT/supaclicker.github.io/raw/main/oi%20oi%20oe%20oi%20a%20eye%20eye.mp3");

        const mainButton = document.createElement('button');
        mainButton.className = 'main-button rainbow-strobe';
        mainButton.textContent = timesClicked.toLocaleString();
        document.body.appendChild(mainButton);

        const upgradeButton = document.createElement('button');
        upgradeButton.className = 'upgrade-button rainbow-strobe';
        upgradeButton.textContent = `Upgrade Click Value (${currentUpgradeCost.toLocaleString()})`;
        document.body.appendChild(upgradeButton);

        const cpsDisplay = document.getElementById('cpsDisplay');
        const cpmDisplay = document.getElementById('cpmDisplay');
        const claimButton = document.getElementById('claimButton');
        const rewardTimer = document.getElementById('rewardTimer');
        const resetButton = document.getElementById('resetButton');

        function saveGame() {
            localStorage.setItem('sc_clicks', timesClicked.toString());
            localStorage.setItem('sc_cost', currentUpgradeCost.toString());
            localStorage.setItem('sc_power', maxClicksPerRandom.toString());
            localStorage.setItem('sc_claimTime', lastClaimTime.toString());
        }

        // Just records the timestamp of a physical click
        function recordClick() {
            clickHistory.push(Date.now());
        }

        function updateStats() {
            const now = Date.now();
            // Remove clicks older than 60 seconds
            clickHistory = clickHistory.filter(timestamp => now - timestamp <= 60000);
            
            // CPS: Number of timestamps within the last 1000ms
            const cpsCount = clickHistory.filter(timestamp => now - timestamp <= 1000).length;
            
            // CPM: Total number of timestamps in our 60-second window
            const cpmCount = clickHistory.length;

            cpsDisplay.innerHTML = `<b>CPS:</b> ${cpsCount.toLocaleString()}`;
            cpmDisplay.innerHTML = `<b>CPM:</b> ${cpmCount.toLocaleString()}`;
        }

        function updateVisuals() {
            let bg = BACKGROUNDS.default;
            for (let i = LEVEL_THRESHOLDS.length - 1; i >= 0; i--) {
                if (timesClicked >= LEVEL_THRESHOLDS[i].value) { bg = LEVEL_THRESHOLDS[i].bg; break; }
            }
            document.body.style.backgroundImage = bg;
            mainButton.textContent = timesClicked.toLocaleString();
            upgradeButton.textContent = `Upgrade Click Value (${currentUpgradeCost.toLocaleString()})`;
        }

        function doClick() {
            const reward = BigInt(Math.floor(Math.random() * Number(maxClicksPerRandom))) + 1n;
            timesClicked += reward;
            recordClick(); // Tracks the frequency, not the BigInt value
            
            const lastLevelThreshold = LEVEL_THRESHOLDS[LEVEL_THRESHOLDS.length - 1].value;
            if (timesClicked >= lastLevelThreshold) {
                oiSound.currentTime = 0;
                oiSound.play().catch(() => {});
            } else {
                clickSound.currentTime = 0;
                clickSound.play().catch(() => {});
            }

            updateVisuals();
            saveGame();
        }

        function doUpgrade() {
            if (timesClicked >= currentUpgradeCost) {
                timesClicked -= currentUpgradeCost;
                currentUpgradeCost = BigInt(Math.floor(Number(currentUpgradeCost) * 2.9));
                maxClicksPerRandom = BigInt(Math.floor(Number(maxClicksPerRandom) * 3));
                updateVisuals();
                saveGame();
            }
        }

        mainButton.addEventListener('click', (e) => { e.preventDefault(); doClick(); });
        upgradeButton.addEventListener('click', (e) => { e.preventDefault(); doUpgrade(); });

        function updateTimer() {
            const diff = (24 * 60 * 60 * 1000) - (Date.now() - lastClaimTime);
            if (diff <= 0) {
                rewardTimer.textContent = "Reward Ready!";
                claimButton.disabled = false;
            } else {
                const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
                rewardTimer.textContent = `Next Reward: ${h}h ${m}m ${s}s`;
                claimButton.disabled = true;
            }
        }

        claimButton.onclick = () => {
            const bonus = timesClicked / 2n;
            timesClicked += bonus;
            lastClaimTime = Date.now();
            updateTimer(); updateVisuals(); saveGame();
        };

        resetButton.onclick = () => {
            if(confirm("Wipe all progress?")){
                localStorage.clear(); location.reload();
            }
        };

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ' || e.code === 'Space') e.preventDefault();
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'Enter' || e.key === ' ' || e.code === 'Space') {
                if (document.activeElement === mainButton) doClick();
                if (document.activeElement === upgradeButton) doUpgrade();
            }
        });

        updateVisuals();
        setInterval(updateStats, 100);
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
