<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supa Clicker</title>
    <link rel="icon" href="https://raw.githubusercontent.com/zOcMYT/supaclicker.github.io/refs/heads/main/ButtonIcon.png">

    <style>
        :root {
            --default-bg-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRhQhK_wQIRUwpbM_pXJHn18sC8ovXBGirUpQ&s');
            --level1-bg-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRvD90oZ0SLUt9Hizd90BlaEeI4BtMrHiO1HA&s');
            --level2-bg-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRJ0fLUcPj6yXtpt7TsigDNgcijL3CSWuSAzQ&s');
            --level3-bg-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTg95X8tdImD1AZZ0dEnSCZdEx3t3iWyXwqsA&s');
            --level4-bg-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSM9-ANfPq_7ESF0UHnzM6s3HLaSHie6F140Q&s');

            --font-default: 'Marker Felt', fantasy;
            --font-color: white;
            --button-border-color: #ffffff;
            --upgrade-button-bg: rgb(54, 41, 58);
            --claim-button-bg: green;
            --claim-button-hover-bg: darkgreen;
            --claim-button-disabled-bg: gray;
            --reset-button-bg: red;
            --ui-overlay-bg: rgba(0, 0, 0, 0.7); /* Slightly darker for readability */
        }

        body {
            background-color: black;
            background-image: var(--default-bg-image);
            background-size: cover;
            background-position: center;
            transition: background-image 0.5s ease-in-out, background-color 0.5s ease-in-out;
            margin: 0;
            overflow: hidden;
            font-family: var(--font-default);
            color: var(--font-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Essential for layering: ensure UI elements are above button */
        .main-button {
            width: 85%;
            height: 50%;
            font-size: 5vw;
            border: 1vw solid var(--button-border-color);
            border-radius: 1vw;
            color: var(--font-color);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: filter 0.05s ease-in-out, font-size 0.3s ease-in-out;
            box-sizing: border-box;
            background-color: transparent;
            outline: none;
            z-index: 1; /* Low z-index */
        }

        .main-button.glowing {
            filter: blur(10px);
        }

        .upgrade-button {
            width: 50%;
            height: 25%;
            font-size: 1vw;
            background-color: var(--upgrade-button-bg);
            border: 1vw solid var(--button-border-color);
            border-radius: 1vw;
            color: var(--font-color);
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            transition: background-color 0.3s ease-in-out;
            box-sizing: border-box;
            outline: none;
            z-index: 2; /* Low z-index */
        }

        #dailyRewardContainer {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: var(--ui-overlay-bg);
            color: var(--font-color);
            padding: 10px;
            border-radius: 5px;
            z-index: 1000; /* High z-index */
            text-align: center;
        }

        /* FIXED STATS CONTAINER */
        #statsContainer {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background-color: var(--ui-overlay-bg);
            color: var(--font-color);
            padding: 15px;
            border-radius: 8px;
            z-index: 1000; /* High z-index ensures visibility */
            font-size: 1.5rem;
            pointer-events: none; /* Allows clicking buttons through the text */
            border: 1px solid rgba(255, 255, 255, 0.2);
            min-width: 150px;
        }

        #statsContainer div {
            margin: 5px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #rewardTimer {
            font-size: 1.2em;
            margin-bottom: 5px;
        }

        #claimButton {
            background-color: var(--claim-button-bg);
            color: var(--font-color);
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            transition: background-color 0.3s ease-in-out;
            outline: none;
        }

        #claimButton:hover:not(:disabled) {
            background-color: var(--claim-button-hover-bg);
        }

        #claimButton:disabled {
            background-color: var(--claim-button-disabled-bg);
            cursor: not-allowed;
        }

        #resetButtonContainer {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
        }

        #resetButton {
            background-color: var(--reset-button-bg);
            color: var(--font-color);
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            outline: none;
        }

        .rainbow-strobe {
            background-image: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet);
            background-size: 400% 400%;
            animation: rainbow 1.5s linear infinite;
        }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @media (max-width: 768px) {
            .main-button { width: 90%; height: 40%; }
            .upgrade-button { width: 80%; height: 20%; bottom: 2%; }
            #statsContainer { font-size: 1rem; bottom: 10px; left: 10px; }
        }
    </style>
</head>
<body>

    <div id="dailyRewardContainer">
        <div id="rewardTimer"></div>
        <button id="claimButton">Claim Daily Reward (1.5x)</button>
    </div>

    <!-- Stats UI remains at the top of the DOM -->
    <div id="statsContainer">
        <div id="cpsDisplay">CPS: 0</div>
        <div id="cpmDisplay">CPM: 0</div>
    </div>

    <div id="resetButtonContainer">
        <button id="resetButton">Reset Game</button>
    </div>

    <script>
        const BACKGROUNDS = {
            default: 'url(\'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRhQhK_wQIRUwpbM_pXJHn18sC8ovXBGirUpQ&s\')',
            level1: 'url(\'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRvD90oZ0SLUt9Hizd90BlaEeI4BtMrHiO1HA&s\')',
            level2: 'url(\'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRJ0fLUcPj6yXtpt7TsigDNgcijL3CSWuSAzQ&s\')',
            level3: 'url(\'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTg95X8tdImD1AZZ0dEnSCZdEx3t3iWyXwqsA&s\')',
            level4: 'url(\'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSM9-ANfPq_7ESF0UHnzM6s3HLaSHie6F140Q&s\')'
        };

        const FONT_SIZES = {
            default: '5vw',
            large: '4vw',
            larger: '3vw',
            largest: '2vw',
            extraLarge: '1vw',
            extraExtraLarge: '0.9vw'
        };

        const LEVEL_THRESHOLDS = [
            { value: 1_000_000_000n, bg: BACKGROUNDS.level1, fs: FONT_SIZES.large },
            { value: 1_000_000_000_000_000n, bg: BACKGROUNDS.level2, fs: FONT_SIZES.largest },
            { value: 1_000_000_000_000_000_000_000n, bg: BACKGROUNDS.level3, fs: FONT_SIZES.extraLarge },
            { value: 1_000_000_000_000_000_000_000_000_000n, bg: BACKGROUNDS.level4, fs: FONT_SIZES.extraExtraLarge }
        ];

        let currentUpgradeCost = 250n;
        let maxClicksPerRandom = 5n;
        let timesClicked = 0n;

        // Statistics Tracking Logic
        let clickHistory = [];
        const cpsDisplay = document.getElementById('cpsDisplay');
        const cpmDisplay = document.getElementById('cpmDisplay');

        const mainButton = document.createElement('button');
        const upgradeClickButton = document.createElement('button');
        let clickSound;
        let clickSound2;

        const claimButton = document.getElementById('claimButton');
        const rewardTimer = document.getElementById('rewardTimer');

        const REWARD_MULTIPLIER = 1.5;
        const REWARD_COOLDOWN_MS = 24 * 60 * 60 * 1000;
        let lastClaimTime = localStorage.getItem('lastClaimTime') ? parseInt(localStorage.getItem('lastClaimTime'), 10) : 0;
        let hasReachedCelebrationThreshold = false;

        const resetButton = document.getElementById('resetButton');

        function recordClick(value) {
            clickHistory.push({ time: Date.now(), value: value });
        }

        function updateStats() {
            const now = Date.now();
            // Clear history older than 60 seconds
            clickHistory = clickHistory.filter(item => now - item.time <= 60000);

            let cps = 0n;
            let cpm = 0n;

            for (const item of clickHistory) {
                if (now - item.time <= 1000) {
                    cps += item.value;
                }
                cpm += item.value;
            }

            cpsDisplay.textContent = `CPS: ${cps.toLocaleString()}`;
            cpmDisplay.textContent = `CPM: ${cpm.toLocaleString()}`;
        }

        function applyNiceEffect(clickValue) {
            const glowThreshold = BigInt(Math.floor(Number(maxClicksPerRandom) * 0.75));
            if (clickValue >= glowThreshold) {
                mainButton.classList.add('glowing');
                setTimeout(() => {
                    mainButton.classList.remove('glowing');
                }, 150);
            }
        }

        function updateVisuals(currentClicks) {
            let appliedThreshold = false;
            for (let i = LEVEL_THRESHOLDS.length - 1; i >= 0; i--) {
                if (currentClicks >= LEVEL_THRESHOLDS[i].value) {
                    document.body.style.backgroundImage = LEVEL_THRESHOLDS[i].bg;
                    mainButton.style.fontSize = LEVEL_THRESHOLDS[i].fs;
                    appliedThreshold = true;
                    break;
                }
            }
            if (!appliedThreshold) {
                document.body.style.backgroundImage = BACKGROUNDS.default;
                mainButton.style.fontSize = FONT_SIZES.default;
            }
        }

        function playSound() {
            if (clickSound) {
                clickSound.currentTime = 0;
                clickSound.play().catch(e => {});
            }
        }

        function playCelebrationSound() {
            if (clickSound2) {
                clickSound2.currentTime = 0;
                clickSound2.play().catch(e => {});
            }
        }

        function handleMainButtonClick() {
            const numClickRng = BigInt(Math.floor(Math.random() * Number(maxClicksPerRandom))) + 1n;
            timesClicked += numClickRng;

            recordClick(numClickRng);
            mainButton.textContent = timesClicked.toLocaleString();
            applyNiceEffect(numClickRng);
            updateVisuals(timesClicked);
            playSound();

            const CELEBRATION_THRESHOLD = 1_000_000_000_000_000_000_000_000_000n;
            if (timesClicked >= CELEBRATION_THRESHOLD && !hasReachedCelebrationThreshold) {
                playCelebrationSound();
                hasReachedCelebrationThreshold = true;
            }
        }

        function handleUpgradeButtonClick() {
            if (timesClicked >= currentUpgradeCost) {
                timesClicked -= currentUpgradeCost;
                currentUpgradeCost = BigInt(Math.floor(Number(currentUpgradeCost) * 2.9));
                maxClicksPerRandom = BigInt(Math.floor(Number(maxClicksPerRandom) * 3));

                mainButton.textContent = timesClicked.toLocaleString();
                upgradeClickButton.textContent = `Upgrade Click Value (${currentUpgradeCost.toLocaleString()})`;

                updateVisuals(timesClicked);
            }
        }

        function updateRewardTimer() {
            const now = Date.now();
            const timeSinceLastClaim = now - lastClaimTime;

            if (timeSinceLastClaim >= REWARD_COOLDOWN_MS) {
                rewardTimer.textContent = "Reward Ready!";
                claimButton.disabled = false;
            } else {
                const timeLeft = REWARD_COOLDOWN_MS - timeSinceLastClaim;
                const hours = Math.floor(timeLeft / (1000 * 60 * 60));
                const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

                rewardTimer.textContent = `Time until reward: ${hours}h ${minutes}m ${seconds}s`;
                claimButton.disabled = true;
            }
        }

        function claimDailyReward() {
            const rewardValue = (timesClicked * BigInt(Math.floor(REWARD_MULTIPLIER * 1000))) / BigInt(1000);
            const addedValue = rewardValue - timesClicked;
            timesClicked = rewardValue;
            
            if (addedValue > 0n) recordClick(addedValue);
            
            mainButton.textContent = timesClicked.toLocaleString();
            lastClaimTime = Date.now();
            localStorage.setItem('lastClaimTime', lastClaimTime);
            updateVisuals(timesClicked);
            updateRewardTimer();
        }

        function initializeAudio() {
            clickSound = new Audio("https://github.com/zOcMYT/supaclicker.github.io/raw/main/Mouseclick.wav");
            clickSound2 = new Audio("https://github.com/zOcMYT/supaclicker.github.io/raw/main/oi%20oi%20oe%20oi%20a%20eye%20eye.mp3");
        }

        function resetGame() {
            timesClicked = 0n;
            currentUpgradeCost = 250n;
            maxClicksPerRandom = 5n;
            hasReachedCelebrationThreshold = false;
            clickHistory = [];

            mainButton.textContent = "0";
            upgradeClickButton.textContent = `Upgrade Click Value (${currentUpgradeCost.toLocaleString()})`;
            document.body.style.backgroundImage = BACKGROUNDS.default;
            
            localStorage.removeItem('lastClaimTime');
            lastClaimTime = 0;
            updateRewardTimer();
            updateStats();
        }

        window.addEventListener('keydown', (e) => {
            if (e.repeat && (e.key === 'Enter' || e.key === ' ')) e.preventDefault();
        });

        // Initialize UI
        mainButton.className = 'main-button rainbow-strobe';
        mainButton.textContent = "0";
        document.body.append(mainButton);

        upgradeClickButton.className = 'upgrade-button rainbow-strobe';
        upgradeClickButton.textContent = `Upgrade Click Value (${currentUpgradeCost.toLocaleString()})`;
        document.body.append(upgradeClickButton);

        mainButton.addEventListener('click', handleMainButtonClick);
        upgradeClickButton.addEventListener('click', handleUpgradeButtonClick);
        claimButton.addEventListener('click', claimDailyReward);
        resetButton.addEventListener('click', resetGame);

        initializeAudio();
        updateRewardTimer();
        
        setInterval(updateRewardTimer, 1000);
        setInterval(updateStats, 100); 
    </script>
</body>
</html>
