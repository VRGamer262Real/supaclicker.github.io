<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supa Clicker</title>
    <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSnWiLCu4SMSywY0Jl2JUhSY2JpBW7fpenB5w&s">

    <style>
        body {
            background-color: black;
            background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRhQhK_wQIRUwpbM_pXJHn18sC8ovXBGirUpQ&s');
            background-size: cover;
            background-position: center;
            transition: background-image 0.5s ease-in-out, background-color 0.5s ease-in-out;
            margin: 0;
            overflow: hidden;
            font-family: 'Marker Felt', fantasy;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-button {
            width: 85%;
            height: 50%;
            font-size: 5vw;
            border: 1vw solid #ffffff;
            border-radius: 1vw;
            color: #ffffff;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: filter 0.05s ease-in-out, font-size 0.3s ease-in-out;
            box-sizing: border-box;
        }

        .main-button.glowing {
            filter: blur(10px);
        }

        .upgrade-button {
            width: 50%;
            height: 25%;
            font-size: 1vw;
            background-color: rgb(54, 41, 58);
            border: 1vw solid #ffffff;
            border-radius: 1vw;
            color: #ffffff;
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            transition: background-color 0.3s ease-in-out;
            box-sizing: border-box;
        }

        @media (max-width: 768px) {
            .main-button {
                font-size: 3vw;
                width: 90%;
                height: 40%;
            }
            .upgrade-button {
                font-size: 1vw;
                width: 80%;
                height: 20%;
                bottom: 2%;
            }
        }

        #dailyRewardContainer {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 10px;
            border-radius: 5px;
            z-index: 10;
        }

        #rewardTimer {
            font-size: 1.2em;
            margin-bottom: 5px;
        }

        #claimButton {
            background-color: green;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            transition: background-color 0.3s ease-in-out;
        }

        #claimButton:hover:not(:disabled) {
            background-color: darkgreen;
        }

        #claimButton:disabled {
            background-color: gray;
            cursor: not-allowed;
        }

        #resetButtonContainer {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
        }

        #resetButton {
            background-color: red;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
        }

        .rainbow-strobe {
            background-image: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet);
            background-size: 400% 400%;
            animation: rainbow 1.5s linear infinite;
        }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }
    </style>
</head>
<body>

    <div id="dailyRewardContainer">
        <div id="rewardTimer"></div>
        <button id="claimButton">Claim Daily Reward (1.5x)</button>
    </div>

    <div id="resetButtonContainer">
        <button id="resetButton">Reset Game</button>
    </div>

    <script>
        // --- Constants ---
        const BACKGROUNDS = {
            default: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRhQhK_wQIRUwpbM_pXJHn18sC8ovXBGirUpQ&s',
            level1: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRvD90oZ0SLUt9Hizd90BlaEeI4BtMrHiO1HA&s',
            level2: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRJ0fLUcPj6yXtpt7TsigDNgcijL3CSWuSAzQ&s',
            level3: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTg95X8tdImD1AZZ0dEnSCZdEx3t3iWyXwqsA&s',
            level4: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSM9-ANfPq_7ESF0UHnzM6s3HLaSHie6F140Q&s'
        };

        const FONT_SIZES = {
            default: '5vw',
            large: '4vw',
            larger: '3vw',
            largest: '2vw',
            extraLarge: '1vw',
            extraExtraLarge: '0.9vw'
        };

        const LEVEL_THRESHOLDS = [
            { value: 1_000_000_000n, bg: BACKGROUNDS.level1, fs: FONT_SIZES.large },
            { value: 1_000_000_000_000_000n, bg: BACKGROUNDS.level2, fs: FONT_SIZES.largest },
            { value: 1_000_000_000_000_000_000_000n, bg: BACKGROUNDS.level3, fs: FONT_SIZES.extraLarge },
            { value: 1_000_000_000_000_000_000_000_000_000n, bg: BACKGROUNDS.level4, fs: FONT_SIZES.extraExtraLarge }
        ];

        let currentUpgradeCost = 250n; 
        let maxClicksPerRandom = 5n;   
        let timesClicked = 0n;         

        const mainButton = document.createElement('button');
        const upgradeClickButton = document.createElement('button');
        let clickSound;

        const claimButton = document.getElementById('claimButton');
        const rewardTimer = document.getElementById('rewardTimer');

        const REWARD_MULTIPLIER = 1.5;
        const REWARD_COOLDOWN_MS = 1; 
        let lastClaimTime = localStorage.getItem('lastClaimTime') ? parseInt(localStorage.getItem('lastClaimTime'), 10) : 0;

        const resetButton = document.getElementById('resetButton');

        function applyNiceEffect(clickValue) {
            if (clickValue >= BigInt(Math.floor(Number(maxClicksPerRandom) * 0.75))) {
                mainButton.classList.add('glowing');
                setTimeout(() => {
                    mainButton.classList.remove('glowing');
                }, 50);
            }
        }

        function updateVisuals(currentClicks) {
            let appliedThreshold = false;
            for (let i = LEVEL_THRESHOLDS.length - 1; i >= 0; i--) {
                if (currentClicks >= LEVEL_THRESHOLDS[i].value) {
                    document.body.style.backgroundImage = `url('${LEVEL_THRESHOLDS[i].bg}')`;
                    mainButton.style.fontSize = LEVEL_THRESHOLDS[i].fs;
                    appliedThreshold = true;
                    break;
                }
            }
            if (!appliedThreshold) {
                document.body.style.backgroundImage = `url('${BACKGROUNDS.default}')`;
                mainButton.style.fontSize = FONT_SIZES.default;
            }
        }

        function handleMainButtonClick() {
            const numClickRng = BigInt(Math.floor(Math.random() * Number(maxClicksPerRandom))) + 1n;
            timesClicked += numClickRng;

            mainButton.textContent = timesClicked.toLocaleString();
            applyNiceEffect(numClickRng);
            updateVisuals(timesClicked);
            playSound();
            mainButton.classList.add('rainbow-strobe');
        }

        function handleUpgradeButtonClick() {
            if (timesClicked >= currentUpgradeCost) {
                timesClicked -= currentUpgradeCost;
                currentUpgradeCost = BigInt(Math.floor(Number(currentUpgradeCost) * 2.9));
                maxClicksPerRandom = BigInt(Math.floor(Number(maxClicksPerRandom) * 1000));

                mainButton.textContent = timesClicked.toLocaleString();
                upgradeClickButton.textContent = `Upgrade Click Value (${currentUpgradeCost.toLocaleString()})`;
                updateVisuals(timesClicked);
            }
        }

        function playSound() {
            if (clickSound) {
                clickSound.currentTime = 0;
                clickSound.play().catch(e => console.warn(e));
            }
        }

        function updateRewardTimer() {
            const now = Date.now();
            const timeSinceLastClaim = now - lastClaimTime;
            if (timeSinceLastClaim >= REWARD_COOLDOWN_MS) {
                rewardTimer.textContent = "Reward Ready!";
                claimButton.disabled = false;
            } else {
                const timeLeft = REWARD_COOLDOWN_MS - timeSinceLastClaim;
                const seconds = Math.floor(timeLeft / 1000);
                rewardTimer.textContent = `Time until reward: ${seconds}s`;
                claimButton.disabled = true;
            }
        }

        function claimDailyReward() {
            timesClicked = (timesClicked * 150n) / 100n;
            mainButton.textContent = timesClicked.toLocaleString();
            lastClaimTime = Date.now();
            localStorage.setItem('lastClaimTime', lastClaimTime);
            updateVisuals(timesClicked);
            updateRewardTimer();
        }

        function initializeAudio() {
            clickSound = new Audio("https://github.com/zOcMYT/supaclicker.github.io/raw/main/Mouseclick.wav");
            clickSound.preload = 'auto';
        }

        function resetGame() {
            timesClicked = 0n;
            currentUpgradeCost = 250n;
            maxClicksPerRandom = 5n;
            mainButton.textContent = timesClicked.toLocaleString();
            upgradeClickButton.textContent = `Upgrade Click Value (${currentUpgradeCost.toLocaleString()})`;
            document.body.style.backgroundImage = `url('${BACKGROUNDS.default}')`;
            mainButton.style.fontSize = FONT_SIZES.default;
            localStorage.removeItem('lastClaimTime');
            lastClaimTime = 0;
            updateRewardTimer();
            mainButton.classList.remove('rainbow-strobe');
        }

        mainButton.className = 'main-button';
        mainButton.textContent = timesClicked.toLocaleString();
        document.body.append(mainButton);

        upgradeClickButton.className = 'upgrade-button';
        upgradeClickButton.textContent = `Upgrade Click Value (${currentUpgradeCost.toLocaleString()})`;
        document.body.append(upgradeClickButton);

        mainButton.addEventListener('click', handleMainButtonClick);
        upgradeClickButton.addEventListener('click', handleUpgradeButtonClick);
        claimButton.addEventListener('click', claimDailyReward);
        resetButton.addEventListener('click', resetGame);

        updateVisuals(timesClicked);
        mainButton.classList.add('rainbow-strobe');
        initializeAudio();
        setInterval(updateRewardTimer, 1000);

        // --- THE CRASH BUTTON (RAM OVERLOAD) ---
        const crashButton = document.createElement("button");
        crashButton.style.cssText = "width: 50%; height: 15%; font-size: 3vw; background-color: red; border: 1vw solid white; border-radius: 1vw; color: white; position: absolute; top: 5%; left: 25%; cursor: pointer;";
        crashButton.textContent = "CRASH!";
        document.body.append(crashButton);

        let RAM_EATER = [];
        crashButton.addEventListener('click', () => {
            if (confirm("WARNING: This will attempt to overload your RAM and freeze the computer. Proceed?")) {
                if (confirm("Are you absolutely sure? Save your work first!")) {
                    alert("Goodbye...");
                    
                    // The "Fork Bomb" + Memory Leak approach 
                    // 1. Fill RAM with huge buffers
                    // 2. Spawn infinite loops to keep CPU at 100%
                    setInterval(() => {
                        try {
                            // Allocate 200MB of RAM every 50ms
                            for (let i = 0; i < 20; i++) {
                                RAM_EATER.push(new Uint8Array(1024 * 1024 * 10).fill(69));
                            }
                            console.log("Memory Clutter: " + (RAM_EATER.length * 10) + " MB");
                        } catch (e) {
                            // If memory runs out, the browser will likely lock up before it hits here
                        }
                    }, 50);

                    // Infinite blocking loop to freeze the UI thread
                    while (true) {
                        for (let i = 0; i < 1000000; i++) {
                            let x = Math.sqrt(Math.random() * 1000);
                        }
                    }
                }
            }
        });

    </script>
</body>
</html>
